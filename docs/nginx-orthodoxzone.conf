server {
    server_name orthodox.zone www.orthodox.zone;
    root /var/www/orthodox.zone/html;
    index index.php index.html;

    # Gzip (fallback)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xhtml+xml
        image/svg+xml;

    # Brotli
    brotli on;
    brotli_comp_level 6;
     brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xhtml+xml
        image/svg+xml;

    location / {
        index index.htm index.html;
    }

    location ~ /\.ht {
        deny all;
    }

    # Orthocal JSON/API namespace
    location /orthocal-api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Orthocal web interface
    location /calendar/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ "^/(date|saints|hymns|readings)/[0-9]{4}-[0-9]{2}-[0-9]{2}$" {
        proxy_pass http://127.0.0.1:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ "^/api/date/[0-9]{4}-[0-9]{2}-[0-9]{2}$" {
        proxy_pass http://127.0.0.1:8080$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    http2 on;

    ssl_certificate /etc/letsencrypt/live/orthodox.zone/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/orthodox.zone/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    }

server {
    if ($host = orthodox.zone) {
        return 301 https://$host$request_uri;
}

    listen 80;
    server_name orthodox.zone
    return 404;
}
